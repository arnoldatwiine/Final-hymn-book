<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gospel Music</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
  <style>
    body.dark {
      background-color: #111;
      color: #eee;
    }
  </style>
</head>
<body class="bg-white text-black dark:bg-black dark:text-white transition duration-300">

  <!-- HEADER -->
  <header class="flex justify-between items-center px-4 py-2 bg-white dark:bg-gray-900 shadow sticky top-0 z-50">
    <h1 class="text-xl font-bold text-green-600">Gospel Music</h1>
    
    <!-- ✅ ADDED Home button (nothing removed) -->
    <div class="flex items-center gap-3">
      <a href="home.html" class="px-3 py-1 bg-green-600 text-white text-sm rounded hover:bg-green-700">
        Home
      </a>

      <button id="menuToggle">☰</button>
    </div>

    <div id="menuDropdown" class="dropdown hidden">
      <button onclick="toggleTheme()">Toggle Dark Mode</button>
      <a href="privacy.html" class="block px-4 py-2 text-left">Privacy Policy</a>
    </div>
  </header>

  <!-- SEARCH BAR -->
  <input 
    type="text" 
    id="search" 
    placeholder="Search gospel videos..." 
    class="w-full max-w-md mx-auto block p-3 my-4 text-black bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
/>

  <!-- VIDEO GRID -->
  <main id="videoContainer" class="p-4 grid gap-4 grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4">
    <!-- Videos added by gospel.js -->
  </main>

  <!-- VIDEO MODAL -->
  <div id="videoModal" class="fixed inset-0 bg-black bg-opacity-80 hidden z-50 flex items-center justify-center">
    <div class="bg-white rounded-md overflow-hidden shadow-lg w-[90%] max-w-3xl relative">
      <button id="closeModal" class="absolute top-2 right-2 text-white bg-red-600 px-2 py-1 text-xs rounded hover:bg-red-700">×</button>
      <div class="aspect-video w-full">
        <iframe id="videoPlayer" class="w-full h-full" frameborder="0" allowfullscreen allow="autoplay"></iframe>
      </div>
    </div>
  </div>

  <!-- PRIVACY MODAL -->
  <div id="privacyModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white dark:bg-gray-900 text-gray-800 dark:text-white rounded-lg shadow-lg p-6 max-w-lg w-full relative">
      <button onclick="closePrivacyModal()" class="absolute top-2 right-2 text-red-600 text-lg">×</button>
      <h2 class="text-xl font-semibold mb-4">Privacy Policy</h2>
      <p class="text-sm leading-relaxed">
        This page displays gospel music manually curated. No data is collected or tracked.
      </p>
    </div>
  </div>

  <!-- EXISTING JS -->
  <script src="gospel.js"></script>

  <!-- YOUR ORIGINAL SEARCH (UNCHANGED) -->
  <script>
    const searchInput = document.getElementById('search');
    const container = document.getElementById('videoContainer');

    function filterCards() {
      const value = searchInput.value.toLowerCase();
      const cards = container.querySelectorAll('div'); // each card is a div
      cards.forEach(card => {
        const titleEl = card.querySelector('h3');
        if (titleEl) {
          const text = titleEl.textContent.toLowerCase();
          card.style.display = text.includes(value) ? '' : 'none';
        }
      });
    }

    searchInput.addEventListener('input', filterCards);

    const observer = new MutationObserver(filterCards);
    observer.observe(container, { childList: true });
  </script>

  <!-- ✅ ADDED FIX -->
  <script>
    function improvedFilter() {
      const value = document.getElementById('search').value.toLowerCase();
      const container = document.getElementById('videoContainer');

      const cards = container.querySelectorAll('div.bg-white');

      cards.forEach(card => {
        const titleEl = card.querySelector('h3');
        if (!titleEl) return;

        const text = titleEl.textContent.toLowerCase();
        card.style.display = text.includes(value) ? '' : 'none';
      });
    }

    document.getElementById('search').addEventListener('input', improvedFilter);

    const fixObserver = new MutationObserver(improvedFilter);
    fixObserver.observe(document.getElementById('videoContainer'), {
      childList: true,
      subtree: true
    });
  </script>

  <script>
    document.getElementById('menuToggle').addEventListener('click', () => {
      document.getElementById('menuDropdown').classList.toggle('hidden');
    });

    function toggleTheme() {
      document.body.classList.toggle('dark');
      localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    }

    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark');
    }

    function openPrivacyModal() {
      document.getElementById('privacyModal').classList.remove('hidden');
      document.getElementById('menuDropdown').classList.add('hidden');
    }

    function closePrivacyModal() {
      document.getElementById('privacyModal').classList.add('hidden');
    }
  </script>
  
</body>
</html>
