<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ALL UGANDAN CATHOLIC HYMNS AND SONGS | Home</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="light">

  <!-- Header -->
  <header class="header">
    <h1 class="site-title">ALL UGANDAN CATHOLIC HYMNS AND SONGS</h1>
    <div class="menu">
      <button id="menuToggle">☰</button>
      <div id="menuDropdown" class="dropdown hidden">
        <button onclick="toggleTheme()">Toggle Dark Mode</button>
        <a href="privacy.html" class="block px-4 py-2 text-left">Privacy Policy</a>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Hymns Card -->
    <a href="hymns.html" class="card">
      <div class="emoji">📖</div>
      <h2 class="card-title">Read Hymns</h2>
      <p class="card-desc">Explore spiritual songs and lyrics offline.</p>
    </a>

    <!-- Gospel Card -->
    <a href="gospel.html" class="card">
      <div class="emoji">🎵</div>
      <h2 class="card-title">Gospel Music</h2>
      <p class="card-desc">Watch inspiring gospel videos.</p>
    </a>
  </main>


  <script>
    const toggle = document.getElementById('menuToggle');
    const dropdown = document.getElementById('menuDropdown');

    toggle.addEventListener('click', () => {
      dropdown.classList.toggle('hidden');
    });

    function toggleTheme() {
      document.body.classList.toggle('dark');
      document.body.classList.toggle('light');
    }
  </script>
</body>
</html>
